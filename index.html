<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordWeave · 单词故事</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--head:#f0f6fc;--accent:#ffa657;--green:#7ee787;--blue:#58a6ff;--purple:#d2a8ff;--btn:#238636;--dim:#8b949e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem}
.container{max-width:860px;width:100%}
h1{font-size:1.7rem;color:var(--head)}
.subtitle{color:var(--dim);font-size:.85rem;margin-bottom:1.5rem}
.btn{display:inline-block;background:var(--btn);color:#fff;border:none;padding:9px 22px;border-radius:6px;cursor:pointer;font-size:.95rem;transition:background .2s}
.btn:hover{background:#2ea043}
.btn-sm{font-size:.85rem;padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:var(--card);color:var(--text)}
.btn-sm:hover{background:#21262d}
.btn-sm.danger{color:#da3633;border-color:#da3633}
.btn-sm.danger:hover{background:#da3633;color:#fff}
.mode-toggle{background:#1a1228;color:var(--purple);border:1px solid #d2a8ff44;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:.9rem;transition:all .2s;white-space:nowrap}
.mode-toggle:hover{background:#d2a8ff22}
.mode-toggle.active{background:var(--purple);color:#0d1117;font-weight:700}
.hidden{display:none!important}
.center{text-align:center;margin-top:1rem}
.toast{position:fixed;top:16px;right:16px;background:var(--btn);color:#fff;padding:10px 18px;border-radius:8px;font-size:.9rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Setup */
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:30px;text-align:center;max-width:500px;margin:3rem auto}
.setup-card input{width:100%;padding:10px;margin:10px 0;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.95rem}
.setup-card .hint{color:var(--dim);font-size:.8rem;margin-top:8px}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.toolbar select{background:var(--card);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-size:.9rem;min-width:180px}
.toolbar .info{font-size:.8rem;color:var(--dim);margin-left:auto}

/* Upload */
.upload-area{background:var(--card);border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:1rem;cursor:pointer;transition:border-color .2s}
.upload-area:hover{border-color:var(--blue)}
.upload-area input[type=file]{display:none}
.upload-area p{color:var(--dim);font-size:.9rem}
.upload-row{display:flex;gap:10px;align-items:center;margin-top:10px;justify-content:center}
.upload-row input{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:.9rem;width:200px}

/* Story */
.words-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.words-bar span{background:#1f6feb22;color:var(--blue);border:1px solid #1f6feb44;padding:2px 9px;border-radius:11px;font-size:.82rem}
.section-title{font-size:1.05rem;color:var(--head);margin:1rem 0 .6rem;padding-bottom:5px;border-bottom:1px solid var(--border)}
.story,.translation{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:1.2rem;line-height:1.9;font-size:1rem;text-align:justify;font-family:'Georgia','Noto Serif SC',serif}
.story b,.translation b{color:var(--accent);font-weight:700;cursor:pointer;border-bottom:1px dashed var(--accent)}
.story b:hover,.translation b:hover{background:rgba(255,166,87,.15);border-radius:3px}
.word{cursor:pointer}
.word:hover{background:rgba(88,166,255,.12);border-radius:2px}
.translation .zh{color:var(--green);font-size:.88rem}
.refresh-hint{text-align:center;color:#484f58;font-size:.8rem;margin:.5rem 0}
.refresh-hint kbd{background:#21262d;border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace}

/* Popup */
.popup{position:fixed;background:#1a1f2e;border:1px solid var(--accent);border-radius:8px;padding:8px 14px;color:#fff;font-size:.9rem;z-index:9999;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:220px;text-align:center}
.popup.show{opacity:1;transform:translateY(0)}
.popup .zh-big{font-size:1.3rem;font-weight:700;color:var(--green)}
.popup .en-sm{font-size:.8rem;color:var(--dim);margin-top:2px}

/* Grammar */
.grammar-card{background:var(--card);border:1px solid #d2a8ff33;border-radius:10px;padding:20px;margin-bottom:1.5rem}
.grammar-story{line-height:1.9;font-size:1rem;text-align:justify;font-family:'Georgia','Noto Serif SC',serif;margin-bottom:.8rem}
.grammar-points{background:#1a1228;border:1px solid #d2a8ff22;border-radius:8px;padding:12px 16px;margin-top:12px}
.grammar-points .gp{color:var(--purple);font-size:.85rem;padding:3px 0}
.grammar-points .gp::before{content:'▸ ';color:var(--dim)}
.grammar-chinese{margin-top:12px;color:var(--dim);font-size:.92rem;line-height:1.8}
.loading-text{color:var(--dim);font-style:italic;text-align:center;padding:20px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--dim);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#49020233;border:1px solid #f8514966;border-radius:8px;padding:16px;color:#f85149;margin-bottom:1rem}
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h1 style="margin:0;">📖 WordWeave</h1>
    <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">🧠 语法模式</button>
  </div>
  <p class="subtitle" id="modeSubtitle">单词故事生成器 · 上传你的词库，AI 编故事</p>

  <!-- Setup: API Key -->
  <div class="setup-card hidden" id="setupCard">
    <h2>🔑 首次使用</h2>
    <p style="color:var(--dim);margin:12px 0;">输入你的 DeepSeek API Key（仅存在你的浏览器里）</p>
    <input type="password" id="apiKeyInput" placeholder="sk-...">
    <button class="btn" onclick="saveKey()">保存</button>
    <p class="hint">在 <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--blue);">platform.deepseek.com</a> 获取</p>
  </div>

  <!-- Toast & Popup -->
  <div class="toast" id="toast"></div>
  <div class="popup" id="popup"><div class="zh-big"></div><div class="en-sm"></div></div>

  <!-- MODE 1: VOCAB -->
  <div id="modeVocab">
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <p>📂 拖放或点击上传单词表 <span style="color:var(--blue)">（.txt，一行一个单词）</span></p>
      <input type="file" id="fileInput" accept=".txt" onchange="onFileSelected(event)">
      <div class="upload-row hidden" id="uploadRow">
        <input type="text" id="listName" placeholder="输入词库名称">
        <button class="btn-sm" onclick="doUpload()" style="background:var(--btn);color:#fff;border:none;">⬆️ 上传</button>
      </div>
    </div>
    <div class="toolbar">
      <select id="listSelect" onchange="switchList()"></select>
      <button class="btn-sm danger hidden" id="deleteBtn" onclick="deleteList()">🗑 删除</button>
      <span class="info" id="wordCount"></span>
    </div>
    <p class="refresh-hint">按 <kbd>F5</kbd> 刷新，生成新故事</p>
    <div id="storyArea"></div>
  </div>

  <!-- MODE 2: GRAMMAR -->
  <div id="modeGrammar" class="hidden">
    <div class="grammar-card">
      <div class="grammar-story" id="grammarStory"></div>
      <div class="grammar-points hidden" id="grammarPoints"></div>
      <div class="grammar-chinese hidden" id="grammarChinese"></div>
      <div class="loading-text" id="grammarLoading">⏳ <span class="spinner"></span> AI 正在编...</div>
      <div class="center"><button class="btn" onclick="loadGrammarStory()">🔄 换一篇八卦</button></div>
    </div>
  </div>
</div>

// ====== STATE ======
let apiKey = localStorage.getItem('dw_key') || '';
let currentList = localStorage.getItem('dw_list') || 'TD_SAT_Golden_Words';
let grammarLoaded = false;

// ====== API ======
async function callDeepSeek(messages, temp=0.9, maxTok=800) {
  const r = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body: JSON.stringify({model:'deepseek-chat', messages, temperature:temp, max_tokens:maxTok})
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${await r.text()}`);
  return r.json();
}

function parseJSON(content) {
  content = content.trim();
  if (content.startsWith('```')) {
    content = content.split('\n').slice(1).join('\n');
    if (content.endsWith('```')) content = content.slice(0,-3);
  }
  if (content.startsWith("'") && content.endsWith("'")) content = content.slice(1,-1);
  return JSON.parse(content);
}

// ====== WORD LISTS ======
function getDefaultList() {
  return {name:'TD_SAT_Golden_Words', words:DEFAULT_WORDS};
}

function getUserLists() {
  try { return JSON.parse(localStorage.getItem('dw_user_lists')||'[]'); } catch(e) { return []; }
}

function saveUserLists(lists) { localStorage.setItem('dw_user_lists', JSON.stringify(lists)); }

function getAllLists() {
  const lists = [{name:'TD_SAT_Golden_Words', count:DEFAULT_WORDS.length}];
  getUserLists().forEach(l => lists.push({name:l.name, count:l.words.length}));
  return lists;
}

function getWords(name) {
  if (name === 'TD_SAT_Golden_Words') return [...DEFAULT_WORDS];
  const ul = getUserLists().find(l => l.name === name);
  return ul ? [...ul.words] : [];
}

function sampleWords(arr, n=12) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a.slice(0, Math.min(n, a.length));
}

// ====== SETUP ======
function checkSetup() {
  if (!apiKey) {
    document.getElementById('modeVocab').classList.add('hidden');
    document.getElementById('modeGrammar').classList.add('hidden');
    document.getElementById('modeToggle').classList.add('hidden');
    document.getElementById('setupCard').classList.remove('hidden');
    return false;
  }
  document.getElementById('setupCard').classList.add('hidden');
  document.getElementById('modeToggle').classList.remove('hidden');
  return true;
}

function saveKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) return toast('请输入 API Key');
  localStorage.setItem('dw_key', apiKey);
  checkSetup();
  document.getElementById('modeVocab').classList.remove('hidden');
  initVocab();
}

// ====== TOAST ======
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== POPUP ======
let popupTimer;
const popup = document.getElementById('popup');
function showPopup(e, el) {
  e.stopPropagation();
  const zh = el.getAttribute('data-zh') || el.textContent;
  popup.querySelector('.zh-big').textContent = zh;
  popup.querySelector('.en-sm').textContent = el.textContent;
  const r = el.getBoundingClientRect();
  let top = r.top - popup.offsetHeight - 8, left = r.left + r.width/2 - popup.offsetWidth/2;
  if (top < 8) top = r.bottom + 8;
  if (left < 8) left = 8;
  popup.style.top = top+'px'; popup.style.left = left+'px';
  popup.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => popup.classList.remove('show'), 2000);
}
document.addEventListener('click', () => popup.classList.remove('show'));

// ====== MODE TOGGLE ======
function toggleMode() {
  const btn = document.getElementById('modeToggle');
  const vocab = document.getElementById('modeVocab');
  const grammar = document.getElementById('modeGrammar');
  const subtitle = document.getElementById('modeSubtitle');
  if (grammar.classList.contains('hidden')) {
    vocab.classList.add('hidden'); grammar.classList.remove('hidden');
    btn.textContent = '📖 单词模式'; btn.classList.add('active');
    subtitle.textContent = '复杂语法 + 简单词汇 · 地狱笑话 / 八卦故事';
    if (!grammarLoaded) { loadGrammarStory(); grammarLoaded = true; }
  } else {
    grammar.classList.add('hidden'); vocab.classList.remove('hidden');
    btn.textContent = '🧠 语法模式'; btn.classList.remove('active');
    subtitle.textContent = '单词故事生成器 · 上传你的词库，AI 编故事';
  }
}

// ====== VOCAB MODE ======
function initVocab() {
  renderListSelect();
  generateVocabStory();
}

function renderListSelect() {
  const sel = document.getElementById('listSelect');
  const lists = getAllLists();
  sel.innerHTML = lists.map(l =>
    `<option value="${l.name}" ${l.name===currentList?'selected':''}>${l.name} (${l.count} 词)</option>`
  ).join('');
  const active = lists.find(l => l.name === currentList);
  document.getElementById('wordCount').textContent = active ? `共 ${active.count} 词` : '';
  document.getElementById('deleteBtn').classList.toggle('hidden', !active || active.name==='TD_SAT_Golden_Words');
}

function switchList() {
  currentList = document.getElementById('listSelect').value;
  localStorage.setItem('dw_list', currentList);
  generateVocabStory();
}

function deleteList() {
  if (!confirm('确定删除这个词库？')) return;
  const lists = getUserLists().filter(l => l.name !== currentList);
  saveUserLists(lists);
  currentList = 'TD_SAT_Golden_Words';
  localStorage.setItem('dw_list', currentList);
  renderListSelect();
  generateVocabStory();
  toast('已删除');
}

function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('uploadRow').classList.remove('hidden');
  document.getElementById('listName').value = file.name.replace(/\.txt$/i, '');
}

async function doUpload() {
  const file = document.getElementById('fileInput').files[0];
  const name = document.getElementById('listName').value.trim();
  if (!file || !name) return toast('请选择文件并输入名称');
  const text = await file.text();
  const words = text.split('\n').map(l => l.trim()).filter(l => l);
  if (words.length < 3) return toast('单词太少，至少需要 3 个');

  const lists = getUserLists().filter(l => l.name !== name);
  lists.push({name, words});
  saveUserLists(lists);
  currentList = name;
  localStorage.setItem('dw_list', currentList);
  renderListSelect();
  generateVocabStory();
  toast(`已上传: ${name} (${words.length} 词)`);
  document.getElementById('uploadRow').classList.add('hidden');
}

async function generateVocabStory() {
  if (!checkSetup()) return;
  const words = getWords(currentList);
  if (words.length < 3) {
    document.getElementById('storyArea').innerHTML = '<p style="color:var(--dim);text-align:center;margin:2rem;">词库单词太少</p>';
    return;
  }
  document.getElementById('storyArea').innerHTML = '<div class="loading-text">⏳ <span class="spinner"></span> AI 正在编故事...</div>';
  try {
    const sample = sampleWords(words, 12);
    const resp = await callDeepSeek([
      {role:'system', content:`Write a short story (100-150 words) using ALL these words: ${sample.join(', ')}. Reply in JSON: {"story":"...","all_words":{"word":"meaning",...},"chinese":"全文翻译"}. all_words must contain EVERY word in the story (lowercase). Chinese concise.`},
      {role:'user', content:'Write the story.'}
    ], 0.9, 2000);
    const data = parseJSON(resp.choices[0].message.content);
    const storyText = data.story || '';
    const allWords = data.all_words || {};
    const chinese = data.chinese || '';

    // Build HTML
    let storyHTML = storyText;
    let transHTML = storyText;
    const sorted = [...sample].sort((a,b) => b.length - a.length);
    sorted.forEach(w => {
      const zh = allWords[w] || allWords[w.toLowerCase()] || '';
      const re = new RegExp('\\b('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')\\b','gi');
      storyHTML = storyHTML.replace(re, (m) => `<b data-zh="${zh||m}" onclick="showPopup(event,this)">${m}</b>`);
      transHTML = transHTML.replace(re, (m) => `<b data-zh="${zh||m}" onclick="showPopup(event,this)">${m}</b>${zh?`<span class="zh">（${zh}）</span>`:''}`);
    });
    // Wrap all words in trans for clickability
    transHTML = transHTML.replace(/(\b[a-zA-Z][\w'-]*\b)/g, (m, w) => {
      const zh = allWords[w.toLowerCase()] || '';
      return `<span class="word" data-zh="${zh}" onclick="showPopup(event,this)">${w}</span>`;
    });

    const tags = sample.map(w => `<span>${w}</span>`).join('');
    const storyP = storyHTML.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    const transP = transHTML.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    const chineseP = chinese.replace(/\n/g,'</p><p>');

    document.getElementById('storyArea').innerHTML = `
      <div class="words-bar">${tags}</div>
      <div class="section-title">📝 英文故事（目标单词 <b>加粗</b>）</div>
      <div class="story"><p>${storyP}</p></div>
      <div class="section-title">🔤 中英对照（点击任意单词看释义）</div>
      <div class="translation"><p>${transP}</p></div>
      <div class="section-title">🇨🇳 全文中文翻译</div>
      <div class="translation"><p>${chineseP}</p></div>
      <div class="center"><button class="btn" onclick="generateVocabStory()">🔄 换一个故事</button></div>`;
  } catch(e) {
    document.getElementById('storyArea').innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
  }
}

// ====== GRAMMAR MODE ======
async function loadGrammarStory() {
  if (!checkSetup()) return;
  const storyEl = document.getElementById('grammarStory');
  const pointsEl = document.getElementById('grammarPoints');
  const chineseEl = document.getElementById('grammarChinese');
  const loadingEl = document.getElementById('grammarLoading');
  storyEl.innerHTML = ''; pointsEl.innerHTML = ''; pointsEl.classList.add('hidden'); chineseEl.classList.add('hidden'); loadingEl.classList.remove('hidden');

  try {
    const resp = await callDeepSeek([
      {role:'user', content:`You write dark comedy. Follow these rules EXACTLY.

VOCABULARY: Use ONLY words a 10-year-old native English speaker would know. BANNED: eulogy, deceased, crematorium, mortician, embalmed, casket, probate, bequeath, inheritance, toupee, trowel, urn, epoxy, pivot, grudge, technically — and any formal/SAT word. ALLOWED only simple verbs/nouns/adjectives.

STORY: Write a SHORT story (80-130 words). Dark humor — something awful happens but told so dryly you laugh. Examples of TONE: "My uncle fell into the grave at my aunt's funeral." "The doctor told me I had six months to live, then handed me a bill I couldn't afford." "My boss fired me for being late to his own funeral." Keep it RELATABLE, not abstract.

GRAMMAR: Use 4+ of: subjunctive, inversion, conditional type 3, cleft sentences, participial phrases, complex relatives, passive voice.

Reply in JSON: {"story":"...","grammar":["structure: quote from story",...],"chinese":"全文翻译"}`}
    ], 1.2, 1200);
    const data = parseJSON(resp.choices[0].message.content);

    storyEl.innerHTML = '<p>' + (data.story||'').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>') + '</p>';
    if (data.grammar && data.grammar.length) {
      pointsEl.innerHTML = '<div style="color:var(--purple);font-weight:700;margin-bottom:6px;">📐 语法点</div>' +
        data.grammar.map(g => `<div class="gp">${g}</div>`).join('');
      pointsEl.classList.remove('hidden');
    }
    if (data.chinese) {
      chineseEl.innerHTML = '<div style="color:var(--purple);font-weight:700;margin-bottom:6px;">🇨🇳 中文翻译</div>' + data.chinese;
      chineseEl.classList.remove('hidden');
    }
  } catch(e) {
    storyEl.innerHTML = `<p style="color:#f85149;">❌ ${e.message}</p>`;
  }
  loadingEl.classList.add('hidden');
}

// ====== DRAG & DROP ======
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.style.borderColor = 'var(--accent)'; });
ua.addEventListener('dragleave', () => ua.style.borderColor = '');
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.txt')) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    onFileSelected({target:{files:[file]}});
  }
});

// ====== INIT ======
if (checkSetup()) {
  document.getElementById('modeVocab').classList.remove('hidden');
  initVocab();
}
